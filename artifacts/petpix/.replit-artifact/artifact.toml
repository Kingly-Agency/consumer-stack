kind = "mobile"
previewPath = "/"
title = "PetPix - AI Pet Art"
version = "1.0.0"
id = "artifacts/petpix"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20552

[services.development]
run = "pnpm --filter @workspace/petpix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/petpix", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/petpix", "run", "serve" ]

[services.env]
PORT = "20552"
BASE_PATH = "/"
